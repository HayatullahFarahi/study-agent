<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 720" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
  <style>
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes typing { from { width: 0; } to { width: 100%; } }
    .frame { fill: #1e1e1e; rx: 8; }
    .title-bar { fill: #2d2d2d; }
    .dot-red { fill: #ff5f56; }
    .dot-yellow { fill: #ffbd2e; }
    .dot-green { fill: #27c93f; }
    .user-msg { fill: #264f78; rx: 8; }
    .bot-msg { fill: #2d2d2d; rx: 8; }
    .text { fill: #d4d4d4; font-size: 13px; }
    .text-bright { fill: #e8e8e8; font-size: 13px; font-weight: 600; }
    .text-dim { fill: #808080; font-size: 12px; }
    .text-blue { fill: #569cd6; font-size: 13px; }
    .text-green { fill: #6a9955; font-size: 13px; }
    .text-yellow { fill: #dcdcaa; font-size: 13px; }
    .text-orange { fill: #ce9178; font-size: 13px; }
    .text-cyan { fill: #4ec9b0; font-size: 13px; }
    .text-pink { fill: #c586c0; font-size: 13px; }
    .label { fill: #0078d4; rx: 4; }
    .label-text { fill: #ffffff; font-size: 11px; font-weight: 600; }
    .step1 { animation: fadeIn 0.5s ease-in 0.3s both; }
    .step2 { animation: fadeIn 0.5s ease-in 1.5s both; }
    .step3 { animation: fadeIn 0.5s ease-in 4.0s both; }
    .step4 { animation: fadeIn 0.5s ease-in 6.5s both; }
    .step5 { animation: fadeIn 0.5s ease-in 9.0s both; }
    .badge { rx: 4; }
  </style>

  <!-- Window Frame -->
  <rect class="frame" width="800" height="720"/>
  
  <!-- Title Bar -->
  <rect class="title-bar" width="800" height="32" rx="8"/>
  <rect class="title-bar" width="800" height="16" y="16"/>
  <circle class="dot-red" cx="16" cy="16" r="6"/>
  <circle class="dot-yellow" cx="36" cy="16" r="6"/>
  <circle class="dot-green" cx="56" cy="16" r="6"/>
  <text x="400" y="20" text-anchor="middle" class="text-dim">Copilot Chat — Agent Mode</text>

  <!-- STEP 1: User command -->
  <g class="step1">
    <rect class="user-msg" x="300" y="46" width="480" height="32"/>
    <text x="312" y="66" class="text-bright">/start-study demo</text>
    <rect class="label" x="710" y="52" width="58" height="20"/>
    <text x="739" y="66" text-anchor="middle" class="label-text">You</text>
  </g>

  <!-- STEP 2: Session Header -->
  <g class="step2">
    <rect class="bot-msg" x="20" y="90" width="540" height="172"/>
    <rect class="label" x="24" y="96" width="68" height="20" fill="#6f42c1"/>
    <text x="58" y="110" text-anchor="middle" class="label-text">Copilot</text>
    
    <text x="36" y="132" class="text-green">▶ SESSION STARTED — AI Engineering Fundamentals</text>
    <text x="36" y="150" class="text-dim">━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━</text>
    <text x="36" y="168" class="text">Type        : article</text>
    <text x="36" y="186" class="text">Progress    : 0/5 (0%)</text>
    <text x="36" y="204" class="text">Current Unit: 1.1 — The AI Engineering Stack</text>
    <text x="36" y="222" class="text-dim">━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━</text>
    <text x="36" y="247" class="text-blue">Continue from The AI Engineering Stack or jump to a specific section?</text>
  </g>

  <!-- STEP 3: Teaching block -->
  <g class="step3">
    <rect class="bot-msg" x="20" y="270" width="760" height="224"/>
    <text x="36" y="292" class="text-yellow">🎯 Why It Matters</text>
    <text x="36" y="310" class="text">Most value in AI engineering comes from the application and data</text>
    <text x="36" y="326" class="text">layers — not the model itself. The model is a commodity.</text>

    <text x="36" y="350" class="text-yellow">📌 Key Concept: The AI Engineering Stack</text>
    
    <text x="60" y="370" class="text-dim">┌──────────────────┐</text>
    <text x="60" y="386" class="text-dim">│  Application      │  ← APIs, UI, orchestration</text>
    <text x="60" y="402" class="text-dim">├──────────────────┤</text>
    <text x="60" y="418" class="text-dim">│  Model            │  ← Foundation models, fine-tuning</text>
    <text x="60" y="434" class="text-dim">├──────────────────┤</text>
    <text x="60" y="450" class="text-dim">│  Data &amp; Infra     │  ← Vector DBs, pipelines, eval</text>
    <text x="60" y="466" class="text-dim">└──────────────────┘</text>

    <text x="36" y="484" class="text-cyan">🧠 Mental Model: "The model is the engine — you still need to build the car."</text>
  </g>

  <!-- STEP 4: User ends session -->
  <g class="step4">
    <rect class="user-msg" x="420" y="506" width="360" height="32"/>
    <text x="432" y="526" class="text-bright">/end-session</text>
    <rect class="label" x="710" y="512" width="58" height="20"/>
    <text x="739" y="526" text-anchor="middle" class="label-text">You</text>
  </g>

  <!-- STEP 5: Session saved -->
  <g class="step5">
    <rect class="bot-msg" x="20" y="550" width="540" height="158"/>
    <rect class="label" x="24" y="556" width="68" height="20" fill="#6f42c1"/>
    <text x="58" y="570" text-anchor="middle" class="label-text">Copilot</text>
    
    <text x="36" y="556" class="text-green">✓ SESSION SAVED — AI Engineering Fundamentals</text>
    <text x="36" y="574" class="text-dim">━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━</text>
    <text x="36" y="592" class="text">Covered this session : The AI Engineering Stack</text>
    <text x="36" y="610" class="text">New key concepts     : 1</text>
    <text x="36" y="628" class="text">Overall progress     : 1/5 (20%)</text>
    <text x="36" y="646" class="text-blue">Next up              : 1.2 — Foundation Models and Prompting</text>
  </g>
</svg>
